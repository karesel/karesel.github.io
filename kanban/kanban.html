<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>
    <div class="board">
        <div class="col">
            <div class="coltitle">
                TO DO
                <button onclick="addcard(this)">&plus;</button>
            </div>
            <hr>
        </div>
        <div class="col">
            <div class="coltitle">
                IN PROGRESS
                <button onclick="addcard(this)">&plus;</button>
            </div>
            <hr>
        </div>
        <div class="col">
            <div class="coltitle">
                DONE
                <button onclick="addcard(this)">&plus;</button>
            </div>
            <hr>
        </div>
    </div>
</body>


</html>
